name: Release

# On every push to main, release-please maintains a "release PR" that bumps the
# version and updates CHANGELOG.md from Conventional Commit messages. Merging
# that PR creates the git tag + GitHub Release (notes generated from commits),
# which then triggers the npm publish job below.
#
# Requires a repo secret NPM_TOKEN (npm Automation/granular token with publish
# rights). The GITHUB_TOKEN used by release-please is provided automatically.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      # npm publish runs prepublishOnly (typecheck + test) then prepack (build)
      # automatically, so a broken build/test aborts the publish.
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      # When this repo is public you can add npm provenance: append `--provenance`
      # to the command above and add `id-token: write` to a permissions: block on
      # this job.
